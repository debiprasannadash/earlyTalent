<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Early Talent</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- Logo -->
<div class="logo-section">
    <a href="#">
        <i class="fa-solid fa-seedling"></i>
        <span>Early<span class="highlight">Talent</span></span>
    </a>

    <h2 id="welcome-text">Welcome back, Student!</h2>
    <p>Ready to level up your portfolio?</p>
</div>

<!-- Login Card -->
<div class="login-container">
    <div class="card">

        <!-- Tabs -->
        <div class="tabs">
            <button id="tab-student" onclick="switchTab('student')" class="tab active">
                <i class="fa-solid fa-graduation-cap"></i> Student
            </button>
            <button id="tab-business" onclick="switchTab('business')" class="tab">
                <i class="fa-solid fa-briefcase"></i> Business
            </button>
        </div>

        <!-- Form -->
        <form>

            <!-- Email -->
            <div class="input-group">
                <label>Email address</label>
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" placeholder="you@example.com" required>
                </div>
            </div>

            <!-- Password -->
            <div class="input-group">
                <div class="label-row">
                    <label>Password</label>
                    <a href="#">Forgot password?</a>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>

            <!-- Submit -->
            <button id="submit-btn" class="btn-primary">
                Sign in as Student
            </button>
        </form>
    </div>

    <!-- Signup -->
    <p class="signup-text">
        Don't have an account?
        <a href="#">Create one now</a>
    </p>
</div>

<script src="script.js"></script>

</body>
</html>
